<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pong: Synthwave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- The Main Game Canvas -->
        <canvas id="pongCanvas"></canvas>

        <!-- UI Overlay Layer -->
        <div id="ui-layer">
            
            <!-- Screen 1: Start Screen -->
            <div id="start-screen" class="screen active">
                <h1 class="glitch" data-text="Bounce Blitz">Bounce Blitz</h1>
                <button id="btn-start" class="neon-btn">START SYSTEM</button>
            </div>

            <!-- Screen 2: Mode Select -->
            <div id="mode-screen" class="screen">
                <h2>SELECT MODE</h2>
                <div class="button-group">
                    <button id="btn-single" class="neon-btn">SINGLE PLAYER (SURVIVAL)</button>
                    <button id="btn-multi" class="neon-btn">MULTIPLAYER (VS)</button>
                </div>
                <div id="mobile-warning" style="display: none; color: #ff0055; margin-top: 15px; font-size: 0.9rem;">
                    *Multiplayer is disabled on mobile devices.
                </div>
            </div>

            <!-- In-Game HUD -->
            <div id="hud" class="screen">
                <div id="score-board">
                    <span id="p1-score" style="display:none;">0 | </span> 
                    Score: <span id="score">0</span> 
                    | High: <span id="highScore">0</span>
                </div>
                <div id="message"></div>
                
                <!-- Game Over Controls (Hidden by default) -->
                <div id="game-over-controls" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); flex-direction: column; gap: 15px; align-items: center;">
                    <button id="btn-restart" class="neon-btn">PLAY AGAIN</button>
                    <button id="btn-menu" class="neon-btn" style="border-color: #ff0055; color: #ff0055; box-shadow: 0 0 10px #ff0055 inset, 0 0 10px #ff0055;">MAIN MENU</button>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
